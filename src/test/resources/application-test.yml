spring:
  application:
    name: r2dbc-jwt-auth-test
  
  # R2DBC Configuration for H2 (in-memory test database)
  r2dbc:
    url: r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  
  # JDBC Configuration for Flyway (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

# JWT Configuration (test values)
app:
  jwt:
    secret: TestSecretKeyForJWTMustBeAtLeast256BitsLongForHS256AlgorithmTesting
    expiration-ms: 3600000  # 1 hour for tests

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.r2dbc: DEBUG